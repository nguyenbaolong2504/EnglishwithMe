version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: englishwithme-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: englishwithme
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - englishwithme-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: englishwithme-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/englishwithme
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - englishwithme-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: englishwithme-ai
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - englishwithme-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: englishwithme-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - ai-service
    networks:
      - englishwithme-network

volumes:
  mysql_data:

networks:
  englishwithme-network:
    driver: bridge
